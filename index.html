cat > /home/claude/agb_v6_p1.txt << 'PART1'
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AGB Analytics · v6.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090F;--bg2:#0D1119;--surface:#111520;--card:#161B27;--card2:#1C2236;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#E8ECF8;--text2:#7A86A8;--muted:#3D4560;
  --a1:#5B6EF5;--a2:#818cf8;--a3:rgba(91,110,245,0.10);
  --green:#0FBA7E;--red:#F03E5E;--amber:#F5A623;--blue:#3B82F6;--cyan:#00C2D1;--purple:#A259FF;
  --shadow:0 16px 48px rgba(0,0,0,0.55);--radius:8px;--radius-sm:6px;
  --font:'Sora',sans-serif;--hdr-h:46px;--nav-h:40px;
}
[data-theme="light"]{
  --bg:#F2F4FB;--bg2:#E8EBF5;--surface:#fff;--card:#fff;--card2:#F4F6FF;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);
  --text:#0A0E1F;--text2:#4A5270;--muted:#9BA3C0;--shadow:0 6px 24px rgba(0,0,0,0.09);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 10% -5%,rgba(91,110,245,0.08),transparent 55%),radial-gradient(ellipse 40% 30% at 90% 105%,rgba(0,194,209,0.05),transparent 55%);pointer-events:none;z-index:0}
[data-theme="light"] body::before{background:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--card2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--a1)}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .6s ease,transform .6s ease}
#splash.out{opacity:0;transform:scale(1.05);pointer-events:none}
.splash-logo-wrap{position:relative;width:70px;height:70px;display:flex;align-items:center;justify-content:center}
.splash-logo-txt{font-size:21px;font-weight:800;letter-spacing:5px;color:var(--text);position:relative;z-index:2}
.splash-ring{position:absolute;border-radius:50%;border:1.5px solid transparent;animation:sring 1.3s linear infinite}
.splash-ring:nth-child(1){inset:0;border-top-color:var(--a1);animation-duration:1.1s}
.splash-ring:nth-child(2){inset:11px;border-right-color:var(--cyan);animation-duration:.85s;animation-direction:reverse}
.splash-ring:nth-child(3){inset:22px;border-bottom-color:var(--a2);animation-duration:1.4s}
@keyframes sring{to{transform:rotate(360deg)}}
.splash-wordmark{font-size:9px;font-weight:700;letter-spacing:8px;text-transform:uppercase;color:var(--muted)}
.splash-bar{width:130px;height:2px;background:var(--border2);border-radius:2px;overflow:hidden}
.splash-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--a1),var(--cyan));border-radius:2px;animation:splashbar 2.2s ease-out forwards}
@keyframes splashbar{to{width:100%}}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:8888;background:var(--bg);display:none;align-items:stretch}
.login-layout{display:grid;grid-template-columns:1fr 1fr;width:100%;height:100%}
@media(max-width:768px){.login-layout{grid-template-columns:1fr}.login-visual{display:none!important}}
.login-visual{background:linear-gradient(145deg,#080B18,#0F1430 55%,#0B1120);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;position:relative;overflow:hidden}
.login-visual::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 30% 40%,rgba(91,110,245,0.14),transparent 60%)}
.lv-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(91,110,245,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(91,110,245,0.04) 1px,transparent 1px);background-size:40px 40px}
.lv-content{position:relative;z-index:2;text-align:center;width:100%;max-width:280px}
.lv-logo{font-size:52px;font-weight:800;letter-spacing:10px;color:#fff;margin-bottom:4px;text-shadow:0 0 80px rgba(91,110,245,0.5)}
.lv-tagline{font-size:9px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:36px}
.lv-stats{display:flex;flex-direction:column;gap:10px}
.lv-stat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(12px);transition:all .3s}
.lv-stat:hover{background:rgba(91,110,245,0.08);border-color:rgba(91,110,245,0.2)}
.lv-stat-ico{font-size:20px;flex-shrink:0}
.lv-stat-val{font-size:20px;font-weight:800;color:#fff;line-height:1}
.lv-stat-lbl{font-size:8px;color:rgba(255,255,255,0.35);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.login-form-panel{display:flex;align-items:center;justify-content:center;padding:32px;background:var(--bg);overflow-y:auto}
.login-card{width:100%;max-width:380px;animation:loginIn .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes loginIn{from{opacity:0;transform:translateY(20px)}}
.login-brand{display:flex;align-items:center;gap:8px;margin-bottom:28px}
.login-brand-logo{font-size:16px;font-weight:800;letter-spacing:4px;color:var(--text)}
.login-brand-dot{width:5px;height:5px;border-radius:50%;background:var(--a1)}
.login-brand-ver{font-size:8px;color:var(--muted);font-weight:600;letter-spacing:1px}
.login-avatar{width:60px;height:60px;border-radius:16px;background:var(--a3);border:1.5px solid rgba(91,110,245,0.2);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.login-name{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;margin-bottom:2px}
.login-role{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--a2);margin-bottom:24px}
.login-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.login-field-wrap{position:relative;margin-bottom:10px;display:flex;align-items:center}
.login-input{width:100%;padding:12px 52px 12px 14px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:14px;font-weight:500;letter-spacing:4px;transition:all .25s}
.login-input:focus{outline:none;border-color:var(--a1);box-shadow:0 0 0 4px rgba(91,110,245,0.12)}
.login-input::placeholder{letter-spacing:0;color:var(--muted)}
.login-input.shake{animation:shake .38s ease}
.login-input.err{border-color:var(--red)!important;box-shadow:0 0 0 4px rgba(240,62,94,0.12)!important}
@keyframes shake{0%,100%{transform:translateX(0)}18%,54%{transform:translateX(-10px)}36%,72%{transform:translateX(10px)}90%{transform:translateX(-4px)}}
.fp-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:8px;background:var(--a3);border:1px solid rgba(91,110,245,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
.fp-btn:hover{background:rgba(91,110,245,0.2);border-color:var(--a1)}
.fp-btn.fp-ok{background:rgba(15,186,126,0.18);border-color:var(--green);box-shadow:0 0 20px rgba(15,186,126,0.3)}
.fp-btn.fp-err{background:rgba(240,62,94,0.18);border-color:var(--red)}
.fp-btn.fp-ok .fp-svg path{stroke:#0FBA7E}
.fp-btn.fp-err .fp-svg path{stroke:#F03E5E}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-weight:700;font-size:12px;cursor:pointer;transition:all .25s;letter-spacing:.5px;box-shadow:0 10px 32px rgba(91,110,245,0.35);margin-bottom:8px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 16px 44px rgba(91,110,245,0.5)}
.login-err{font-size:10px;font-weight:600;color:var(--red);opacity:0;transition:opacity .3s;min-height:14px;display:flex;align-items:center;gap:6px}
.login-err.show{opacity:1}
.login-footer{margin-top:24px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.login-footer-lbl{font-size:9px;color:var(--muted);letter-spacing:.5px}
.login-secure{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--green);font-weight:700}

/* HEADER */
#hdr{position:sticky;top:0;z-index:600;height:var(--hdr-h);display:none;align-items:center;justify-content:space-between;padding:0 12px;background:rgba(7,9,15,0.96);backdrop-filter:blur(28px);border-bottom:1px solid var(--border);direction:ltr!important;flex-direction:row!important}
[data-theme="light"] #hdr{background:rgba(242,244,251,0.96)}
.hdr-left{display:flex;align-items:center;gap:7px;flex-shrink:0;direction:ltr!important}
.hdr-back{width:28px;height:28px;border-radius:7px;background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-family:var(--font)}
.hdr-back:hover{border-color:var(--a1);color:var(--a2);background:var(--a3)}
.logo{display:flex;align-items:center;gap:6px;cursor:default}
.logo-agb{font-size:13px;font-weight:800;letter-spacing:4px;color:var(--text)}
.logo-dot{width:4px;height:4px;border-radius:50%;background:var(--a1)}
.logo-domain{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.5px;padding:2px 6px;border:1px solid var(--border2);border-radius:20px}
.hdr-right{display:flex;align-items:center;gap:3px;flex-shrink:0;direction:ltr!important}
.hdr-btn{display:flex;align-items:center;gap:4px;padding:4px 9px;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius-sm);font-size:9px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font);white-space:nowrap}
.hdr-btn:hover{border-color:var(--a1);color:var(--a2)}
.hdr-btn.logout:hover{border-color:var(--red);color:var(--red)}
.hdr-btn.ai-btn{border-color:rgba(91,110,245,0.4);background:rgba(91,110,245,0.08);color:var(--a2)}
.hdr-btn.ai-btn:hover{background:rgba(91,110,245,0.18);border-color:var(--a1)}
.live-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid var(--border2);border-radius:20px;font-size:8px;font-weight:700;color:var(--a2);background:var(--a3);letter-spacing:.5px}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:ldot 2s infinite}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.3}}

/* PAGE NAV BAR */
#page-nav-bar{display:none;position:sticky;top:var(--hdr-h);z-index:500;background:var(--surface);border-bottom:1px solid var(--border);padding:0 12px;height:var(--nav-h);direction:ltr!important}
[data-theme="light"] #page-nav-bar{background:rgba(242,244,251,0.97)}
.page-nav-inner{display:flex;align-items:center;height:100%;gap:5px;justify-content:space-between;direction:ltr!important}
.pnav-tabs{display:flex;gap:2px;align-items:center}
.ptab{padding:4px 11px;border-radius:5px;font-size:9px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--text2);border:none;background:transparent;font-family:var(--font);white-space:nowrap}
.ptab.on{background:var(--a1);color:#fff;box-shadow:0 2px 10px rgba(91,110,245,0.35)}
.ptab:hover:not(.on){color:var(--text);background:rgba(255,255,255,0.05)}
.pnav-right{display:flex;gap:3px;align-items:center}
.chart-type-btn{padding:4px 7px;background:var(--card2);border:1px solid var(--border2);color:var(--text2);border-radius:4px;font-size:10px;cursor:pointer;transition:all .2s;font-family:var(--font)}
.chart-type-btn:hover,.chart-type-btn.active{border-color:var(--a1);color:var(--a2);background:var(--a3)}
.filter-active-badge{display:none;padding:2px 7px;background:rgba(245,166,35,0.12);color:var(--amber);border-radius:4px;font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.filter-active-badge.show{display:inline-flex;align-items:center;gap:3px}
.btn-s{padding:4px 9px;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius-sm);font-size:9px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:3px;font-family:var(--font);transition:all .2s;white-space:nowrap}
.btn-s:hover{border-color:var(--a1);color:var(--a2)}
.btn-s.ai-insights-btn{border-color:rgba(91,110,245,0.4);background:linear-gradient(135deg,rgba(91,110,245,0.12),rgba(0,194,209,0.08));color:var(--a2);font-weight:700}
.btn-s.ai-insights-btn:hover{background:linear-gradient(135deg,rgba(91,110,245,0.22),rgba(0,194,209,0.14));border-color:var(--a1)}
.btn-s.ai-insights-btn.loading{opacity:.7;pointer-events:none}

/* APP */
#app{position:relative;z-index:1;display:none}

/* UPLOAD — full split layout */
#upload{min-height:calc(100vh - var(--hdr-h));display:none;flex-direction:column;background:var(--bg);overflow:hidden}
.upload-hero{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 28px 22px;position:relative}
.upload-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 30%,rgba(91,110,245,0.08),transparent 65%);pointer-events:none}
.hero-inner{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;max-width:960px;width:100%;position:relative;z-index:1}
@media(max-width:820px){.hero-inner{grid-template-columns:1fr;gap:22px;text-align:center}}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--a3);border:1px solid rgba(91,110,245,0.22);border-radius:20px;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--a2);margin-bottom:14px}
.hero-badge-dot{width:4px;height:4px;border-radius:50%;background:var(--a1);animation:ldot 2s infinite}
.hero-h1{font-size:clamp(28px,4vw,46px);font-weight:800;line-height:1.06;letter-spacing:-2px;color:var(--text);margin-bottom:10px}
.hero-h1 .g{background:linear-gradient(120deg,var(--a1),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:11px;line-height:1.75;color:var(--text2);margin-bottom:18px;max-width:400px}
.hero-features{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.feat-item{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--text2);font-weight:500}
.feat-check{width:16px;height:16px;border-radius:4px;background:rgba(15,186,126,0.12);border:1px solid rgba(15,186,126,0.2);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--green);flex-shrink:0}
.hero-cta-row{display:flex;gap:7px;flex-wrap:wrap}
@media(max-width:820px){.hero-cta-row,.hero-features{align-items:center;justify-content:center}}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-weight:700;font-size:11px;cursor:pointer;transition:all .25s;box-shadow:0 8px 24px rgba(91,110,245,0.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(91,110,245,0.5)}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:transparent;border:1.5px solid var(--border2);color:var(--text2);border-radius:var(--radius);font-family:var(--font);font-weight:600;font-size:11px;cursor:pointer;transition:all .25s}
.btn-ghost:hover{border-color:var(--a1);color:var(--a2);background:var(--a3)}
.drop-zone-pro{border:1.5px dashed rgba(91,110,245,0.38);border-radius:20px;padding:30px 22px;text-align:center;cursor:pointer;transition:all .35s cubic-bezier(.34,1.56,.64,1);background:rgba(255,255,255,0.03);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);position:relative;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(91,110,245,0.08),0 4px 32px rgba(0,0,0,0.35),0 1px 0 rgba(255,255,255,0.06) inset}
.drop-zone-pro::after{content:'';position:absolute;top:-50%;left:-60%;width:120%;height:60%;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.04) 50%,transparent 60%);transform:rotate(-10deg);animation:sheen 5s ease-in-out infinite 1s}
@keyframes sheen{0%,100%{opacity:0;left:-60%}50%{opacity:1;left:60%}}
.drop-zone-pro:hover,.drop-zone-pro.over{border-color:var(--a1);border-style:solid;background:rgba(91,110,245,0.07);transform:translateY(-4px) scale(1.01)}
[data-theme="light"] .drop-zone-pro{background:rgba(255,255,255,0.7)}
.dz-icon-pro{font-size:32px;display:block;margin:0 auto 11px;animation:float 3.5s ease-in-out infinite;position:relative;z-index:1}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.dz-ttl-pro{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.3px;position:relative;z-index:1}
.dz-sub-pro{font-size:10px;color:var(--text2);margin-bottom:14px;line-height:1.6;position:relative;z-index:1}
.dz-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-weight:700;font-size:10px;cursor:pointer;transition:all .25s;box-shadow:0 6px 20px rgba(91,110,245,0.32);position:relative;z-index:1}
.dz-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(91,110,245,0.48)}
.fmts{display:flex;justify-content:center;gap:3px;margin-top:10px;flex-wrap:wrap;position:relative;z-index:1}
.fmt{padding:2px 6px;border:1px solid var(--border2);border-radius:3px;font-size:7px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.upload-bottom{padding:18px 28px;border-top:1px solid var(--border);background:var(--surface)}
.upload-bottom-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.up-stats{display:flex;gap:22px;flex-wrap:wrap}
.up-stat-val{font-size:14px;font-weight:800;color:var(--text);letter-spacing:-1px}
.up-stat-lbl{font-size:8px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sample-col{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.sample-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.sample-btns{display:flex;gap:5px;flex-wrap:wrap}
.sbtn{padding:7px 11px;background:var(--card);border:1px solid var(--border2);border-radius:7px;font-size:9px;font-weight:600;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:5px;transition:all .2s;font-family:var(--font)}
.sbtn:hover{border-color:var(--a1);color:var(--a2);background:rgba(91,110,245,0.06);transform:translateY(-2px)}

/* LOADING */
#loading-screen{display:none;min-height:calc(100vh - var(--hdr-h));flex-direction:column;align-items:center;justify-content:center;gap:16px}
.ld-rings{position:relative;width:50px;height:50px}
.ld-ring{position:absolute;border-radius:50%;border:2px solid var(--border)}
.ld-ring:nth-child(1){inset:0;border-top-color:var(--a1);animation:spin 1s linear infinite}
.ld-ring:nth-child(2){inset:10px;border-bottom-color:var(--cyan);animation:spin .72s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-lbl{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--a2)}
.ld-steps{display:flex;flex-direction:column;gap:6px;align-items:center}
.lstep{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:6px}
.lstep.on{opacity:1;color:var(--text2)}

.clr-btn:hover{border-color:var(--red);color:var(--red)}
.pbi-body{display:grid;grid-template-columns:176px 1fr;gap:7px;align-items:start;margin-bottom:7px}

.es-tag{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--a2);margin-bottom:4px}

/* KPI GRID */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:4px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:7px 8px;position:relative;overflow:hidden;transition:all .25s;cursor:default}

.kpi:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(0,0,0,.4)}
.kpi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.kpi-ico{width:20px;height:20px;border-radius:5px;display:grid;place-items:center;font-size:10px;background:rgba(255,255,255,0.05)}

.kbadge.nt{background:rgba(91,110,245,.14);color:var(--a2)}
.kbadge.wn{background:rgba(245,166,35,.14);color:var(--amber)}

.kval{font-size:16px;font-weight:800;line-height:1;color:var(--kc,var(--a2));letter-spacing:-1px}
.kdesc{font-size:8px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi .dl-kpi-btn{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:3px;background:var(--card2);border:1px solid var(--border2);color:var(--muted);font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:0;font-family:var(--font)}
.kpi:hover .dl-kpi-btn{opacity:1}
.kpi .dl-kpi-btn:hover{border-color:var(--a1);color:var(--a2)}

/* CHART GRID */
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px;align-items:start;min-width:0}

.reco-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-bottom:10px}
.reco{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;border-left:3px solid var(--rc,var(--a1));transition:all .2s;position:relative}

.reco-ico{font-size:16px;margin-bottom:5px}

.reco-body{font-size:9px;color:var(--text2);line-height:1.6}

.sect-ttl{font-size:12px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px;color:var(--text)}

.ai-status-bar{display:none;align-items:center;gap:8px;padding:8px 12px;background:linear-gradient(135deg,rgba(91,110,245,0.12),rgba(0,194,209,0.06));border:1px solid rgba(91,110,245,0.25);border-radius:6px;margin-bottom:8px;font-size:9px;font-weight:600;color:var(--a2)}

/* TABLE */
.tcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}

.bg{background:rgba(15,186,126,.12);color:var(--green)}
.br{background:rgba(240,62,94,.12);color:var(--red)}
.ba{background:rgba(245,166,35,.12);color:var(--amber)}
.bb{background:rgba(59,130,246,.12);color:var(--blue)}
.bp{background:rgba(162,89,255,.12);color:var(--purple)}

/* ═══════════════ AI CHAT SIDEBAR ═══════════════ */
#ai-sidebar{
  position:fixed;right:-380px;top:0;width:360px;height:100vh;
  background:var(--card);border-left:1px solid var(--border2);

}
